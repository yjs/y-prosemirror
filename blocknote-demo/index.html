<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockNote + @y/prosemirror Demo</title>
    <style>
      div[data-type="modification"] {
  display: inline;
}

ins,
[data-type="modification"] {
  background: rgba(24, 122, 220, 0.1);
  border-bottom: 2px solid rgba(24, 122, 220, 0.1);
  color: rgb(20, 95, 170);
  text-decoration: none;
}

del,
[DISABLED-data-node-deletion] {
  color: rgba(100, 90, 75, 0.3);
  text-decoration: line-through;
  text-decoration-thickness: 1px;
}

      /* Remote cursor */
      .ProseMirror-yjs-cursor {
        position: relative;
        margin-left: -1px;
        margin-right: -1px;
        border-left: 1px solid black;
        border-right: 1px solid black;
        border-color: var(--user-color, orange);
        word-break: normal;
        pointer-events: none;
      }

      .ProseMirror-yjs-cursor > div {
        position: absolute;
        top: -1.05em;
        left: -1px;
        font-size: 13px;
        background-color: var(--user-color, rgb(250, 129, 0));
        font-family: serif;
        font-style: normal;
        font-weight: normal;
        line-height: normal;
        user-select: none;
        color: white;
        padding-left: 2px;
        padding-right: 2px;
        white-space: nowrap;
      }

      .ProseMirror-yjs-selection {
        background-color: var(--user-color, orange);
        opacity: 0.3;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

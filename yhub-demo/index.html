    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>yhub + BlockNote — collaborative workspace demo</title>
    <style>
      /* Light/dark aware background before JS boots, to avoid FOUC */
      html { background: #ffffff; color-scheme: light; }
      @media (prefers-color-scheme: dark) {
        html { background: #15171c; color-scheme: dark; }
      }
      html[data-theme='dark'] { background: #15171c; color-scheme: dark; }
      html[data-theme='light'] { background: #ffffff; color-scheme: light; }
    </style>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>YHub - Tiptap Demo</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        padding: 24px;
        background: #f9fafb;
        color: #111827;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
        flex-shrink: 0;
      }

      .header h1 { font-size: 20px; font-weight: 600; }

      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .status {
        font-size: 13px;
        padding: 4px 10px;
        border-radius: 12px;
        background: #e5e7eb;
        color: #6b7280;
      }

      .status.connected { background: #d1fae5; color: #065f46; }
      .status.disconnected { background: #fee2e2; color: #991b1b; }
      .status.connecting { background: #fef3c7; color: #92400e; }

      .suggestion-controls {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
      }

      .suggestion-controls select {
        padding: 4px 8px;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        font-size: 13px;
        background: white;
      }

      .suggestion-controls button {
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 500;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        cursor: pointer;
        background: white;
      }

      .suggestion-controls button:hover { background: #f3f4f6; }
      .suggestion-controls button.accept { color: #16a34a; border-color: #16a34a; }
      .suggestion-controls button.accept:hover { background: #f0fdf4; }
      .suggestion-controls button.reject { color: #dc2626; border-color: #dc2626; }
      .suggestion-controls button.reject:hover { background: #fef2f2; }

      .main-container {
        display: flex;
        gap: 16px;
        flex: 1;
        min-height: 0;
      }

      .editor-container {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
      }

      #editor {
        background: white;
        border: 1px solid #e5e7eb;
        border-top: none;
        border-radius: 0 0 8px 8px;
        overflow: auto;
        flex: 1;
      }

      /* ── Toolbar ─────────────────────────────────────────────────────────── */
      #toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        padding: 8px;
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 8px 8px 0 0;
        flex-shrink: 0;
      }
      #toolbar.disabled { opacity: 0.5; pointer-events: none; }
      .tb-group {
        display: flex;
        gap: 2px;
        padding-right: 6px;
        border-right: 1px solid #e5e7eb;
      }
      .tb-group:last-child { border-right: none; padding-right: 0; }
      .tb-btn {
        min-width: 30px;
        height: 28px;
        padding: 0 8px;
        font-size: 13px;
        line-height: 1;
        border: 1px solid transparent;
        border-radius: 6px;
        background: transparent;
        color: #374151;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        white-space: nowrap;
      }
      .tb-btn:hover:not(:disabled) { background: #eef2ff; }
      .tb-btn.active { background: #4f46e5; color: white; }
      .tb-btn:disabled { opacity: 0.35; cursor: default; }

      /* ── Tables ──────────────────────────────────────────────────────────── */
      #editor .ProseMirror table {
        border-collapse: collapse;
        table-layout: fixed;
        width: auto;
        margin: 8px 0;
        overflow: hidden;
      }
      #editor .ProseMirror td,
      #editor .ProseMirror th {
        border: 1px solid #d1d5db;
        padding: 6px 8px;
        vertical-align: top;
        min-width: 64px;
        position: relative;
      }
      #editor .ProseMirror th { background: #f3f4f6; font-weight: 600; text-align: left; }
      #editor .ProseMirror table p { margin: 0; }
      #editor .ProseMirror .selectedCell::after {
        content: '';
        position: absolute;
        inset: 0;
        background: rgba(79, 70, 229, 0.12);
        pointer-events: none;
      }
      #editor .ProseMirror .column-resize-handle {
        position: absolute;
        right: -2px;
        top: 0;
        bottom: 0;
        width: 4px;
        background: #4f46e5;
        pointer-events: none;
      }
      #editor .ProseMirror.resize-cursor { cursor: col-resize; }

      /* ── Images ──────────────────────────────────────────────────────────── */
      #editor .ProseMirror img {
        max-width: 100%;
        height: auto;
        display: block;
        margin: 8px 0;
        border-radius: 6px;
      }
      #editor .ProseMirror img.ProseMirror-selectednode { outline: 2px solid #4f46e5; }

      #editor .ProseMirror {
        min-height: 100%;
        padding: 16px 16px 16px 56px;  /* extra left padding reserves space for avatar gutter */
        outline: none;
        white-space: pre-wrap;  /* required by prosemirror-view, suppresses console warning */
      }

      /* Pin line-height so the gutter-avatar vertical offset stays predictable. */
      #editor .ProseMirror p { margin-bottom: 0.5em; line-height: 1.5; }
      #editor .ProseMirror h1,
      #editor .ProseMirror h2,
      #editor .ProseMirror h3 { margin-bottom: 0.4em; line-height: 1.3; }
      #editor .ProseMirror ul,
      #editor .ProseMirror ol { padding-left: 24px; margin-bottom: 0.5em; }
      #editor .ProseMirror blockquote {
        padding-left: 1em;
        border-left: 3px solid #e5e7eb;
        margin: 0 0 0.5em 0;
        color: #4b5563;
      }
      #editor .ProseMirror pre {
        background: #f3f4f6;
        border-radius: 6px;
        padding: 10px 12px;
        font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
        font-size: 13px;
        margin-bottom: 0.5em;
        overflow-x: auto;
      }
      #editor .ProseMirror code {
        background: #f3f4f6;
        border-radius: 4px;
        padding: 1px 4px;
        font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace;
        font-size: 0.9em;
      }
      #editor .ProseMirror pre code { background: none; padding: 0; }

      /* Remote cursor (yCursorPlugin) */
      .ProseMirror-yjs-cursor {
        position: relative;
        margin-left: -1px;
        margin-right: -1px;
        border-left: 1px solid black;
        border-right: 1px solid black;
        border-color: var(--user-color, orange);
        word-break: normal;
        pointer-events: none;
      }

      .ProseMirror-yjs-cursor > div {
        position: absolute;
        top: -1.05em;
        left: -1px;
        font-size: 13px;
        background-color: var(--user-color, rgb(250, 129, 0));
        font-family: serif;
        font-style: normal;
        font-weight: normal;
        line-height: normal;
        user-select: none;
        color: white;
        padding-left: 2px;
        padding-right: 2px;
        white-space: nowrap;
      }

      .ProseMirror-yjs-selection {
        background-color: var(--user-color, orange);
        opacity: 0.3;
      }

      /* ── Attribution marks ────────────────────────────────────────────────
         Styled after Tiptap's track-changes look (green insertion, red
         strike-through deletion, wavy underline for format), per-user color set
         via --user-color in attribution-marks.js#renderHTML. */
      y-ins {
        background-color: color-mix(in srgb, var(--user-color, #16a34a) 18%, transparent);
        text-decoration: none;
      }
      y-del {
        color: color-mix(in srgb, var(--user-color, #dc2626) 75%, #4a4a4a);
        text-decoration: line-through;
        text-decoration-color: var(--user-color, #dc2626);
        text-decoration-thickness: 1.5px;
      }
      y-fmt {
        text-decoration: underline;
        text-decoration-style: wavy;
        text-decoration-color: var(--user-color, #2563eb);
      }

      /* PM allows attribution marks on the block/doc level too, so a
         wholly-inserted <p> ends up wrapped in a sibling-level <y-ins>. That
         wrapper must not paint, otherwise the inline mark inside paints a second
         time on top. display:contents dissolves the wrapper from layout. */
      y-ins:has(> p, > h1, > h2, > h3, > h4, > h5, > h6, > blockquote, > pre, > ul, > ol, > div, > table),
      y-del:has(> p, > h1, > h2, > h3, > h4, > h5, > h6, > blockquote, > pre, > ul, > ol, > div, > table) {
        background: transparent;
        color: inherit;
        text-decoration: none;
        display: contents;
      }

      /* A wholly inserted/deleted *block* carries the y-ins / y-del mark on the
         block NODE, so PM renders <y-ins><p>…</p></y-ins> / <y-del><p>…</p></y-del>.
         The wrapper above is display:contents, so the inner block would otherwise
         render completely normally and the change would be invisible (the inline
         tint/strikethrough only ever applied to inline marks around text). Style
         the block child directly so inserted blocks get a light-green background
         and deleted blocks get a light-red background + strikethrough — matching
         the per-user colour. */
      y-ins > p, y-ins > h1, y-ins > h2, y-ins > h3, y-ins > h4, y-ins > h5, y-ins > h6,
      y-ins > blockquote, y-ins > pre, y-ins > ul, y-ins > ol, y-ins > li, y-ins > table {
        background: color-mix(in srgb, var(--user-color, #16a34a) 14%, transparent);
      }
      y-del > p, y-del > h1, y-del > h2, y-del > h3, y-del > h4, y-del > h5, y-del > h6,
      y-del > blockquote, y-del > pre, y-del > ul, y-del > ol, y-del > li, y-del > table {
        text-decoration: line-through;
        text-decoration-color: var(--user-color, #dc2626);
        text-decoration-thickness: 1.5px;
        background: color-mix(in srgb, var(--user-color, #dc2626) 14%, transparent);
      }

      /* Deleted leaf/atom nodes (images): line-through is invisible on them, so
         fade the node and outline it in the deletion color instead. */
      y-del img {
        opacity: 0.45;
        outline: 2px solid var(--user-color, #dc2626);
        outline-offset: -2px;
      }
      /* Genuine inline-in-inline nesting (one user writes inside another user's
         insertion) gets a deeper tint + dashed outline. */
      y-ins:not(:has(> p, > h1, > h2, > h3, > h4, > h5, > h6, > blockquote, > pre, > ul, > ol, > div)) y-ins:not(:has(> p, > h1, > h2, > h3, > h4, > h5, > h6, > blockquote, > pre, > ul, > ol, > div)) {
        background-color: color-mix(in srgb, var(--user-color, #16a34a) 36%, transparent);
        outline: 1px dashed color-mix(in srgb, var(--user-color, #16a34a) 60%, transparent);
        outline-offset: -1px;
      }

      /* ── Block-level attribution decorations (added by the gutter plugin) ─ */
      #editor .ProseMirror .y-block-edited {
        position: relative;
        margin-left: -14px;
        padding-left: 14px;
      }
      #editor .ProseMirror .y-block-edited::before {
        content: attr(data-initials);
        position: absolute;
        left: -32px;
        top: 1px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--block-user-color, #6c5ce7);
        color: white;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        user-select: none;
      }
      #editor .ProseMirror .y-block-edited[data-initials-2]::after {
        content: attr(data-initials-2);
        position: absolute;
        left: -18px;
        top: 1px;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--block-user-color-2, #6c5ce7);
        color: white;
        font-size: 9px;
        font-weight: 600;
        letter-spacing: 0.5px;
        display: flex;
        align-items: center;
        justify-content: center;
        line-height: 1;
        border: 2px solid white;
        user-select: none;
      }
      #editor .ProseMirror .y-block-edited[data-initials="··"]::before,
      #editor .ProseMirror .y-block-edited[data-initials="··"]::after { display: none; }

      #editor .ProseMirror .y-block-inserted {
        background-image: linear-gradient(var(--block-user-color, #6c5ce7), var(--block-user-color, #6c5ce7));
        background-repeat: no-repeat;
        background-position: 0 0;
        background-size: 3px 100%;
      }
      #editor .ProseMirror .y-block-deleted {
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='4' height='8' viewBox='0 0 4 8'><path d='M0 0 L4 2 L0 4 L4 6 L0 8' stroke='%23dc2626' fill='none' stroke-width='1.3' stroke-linejoin='miter' stroke-linecap='round'/></svg>");
        background-repeat: repeat-y;
        background-position: 0 0;
        background-size: 4px 8px;
        background-color: rgba(220, 38, 38, 0.07);
      }

      /* Right column */
      .right-column {
        width: 340px;
        flex-shrink: 0;
        display: flex;
        flex-direction: column;
        gap: 16px;
        min-height: 0;
      }

      #activity-panel {
        flex: 1;
        min-height: 0;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .panel-header {
        padding: 14px 16px;
        font-size: 15px;
        font-weight: 600;
        border-bottom: 1px solid #e5e7eb;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .panel-header .panel-title { flex: 1; }

      /* The Rollback / Close buttons get re-parented into .comparing-bar by
         renderComparingBar — they're hidden until that happens. */
      #rollback-btn, #close-version-btn {
        background: white;
        border: 1px solid #c7d2fe;
        cursor: pointer;
        padding: 3px 8px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 500;
        color: #4f46e5;
      }
      #close-version-btn:hover { background: #f5f3ff; }
      #rollback-btn {
        color: #dc2626;
        border-color: #fecaca;
      }
      #rollback-btn:hover { background: #fef2f2; }

      #activity-list {
        overflow-y: auto;
        flex: 1;
        user-select: none;
        padding: 8px;
      }

      .comparing-bar {
        padding: 10px 12px;
        margin: 4px;
        font-size: 12px;
        line-height: 1.4;
        color: #1e1b4b;
        background: #eef2ff;
        border-radius: 8px;
        min-height: 72px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 6px;
      }
      .comparing-bar.empty {
        color: #6b7280;
        background: #f5f3ff;
        border: 1px dashed #c7d2fe;
        font-style: italic;
        flex-direction: row;
        align-items: center;
      }
      .comparing-bar .cmp-icon { margin-right: 4px; font-style: normal; }

      .cmp-row {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }
      .cmp-row-top { justify-content: space-between; }
      .cmp-label { font-weight: 600; color: #4f46e5; }
      .cmp-actions { display: flex; gap: 6px; flex-shrink: 0; }
      .cmp-to-label { color: #4f46e5; font-weight: 500; flex-shrink: 0; }
      .cmp-row-bottom { flex-wrap: nowrap; }
      .cmp-dropdown {
        position: relative;
        display: inline-block;
        padding: 2px 6px;
        background: white;
        border: 1px solid #c7d2fe;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        color: #4f46e5;
        font-size: 12px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        flex: 1 1 0;
        min-width: 0;
      }
      .cmp-dropdown:hover { background: #f5f3ff; }
      .cmp-dropdown-caret { opacity: 0.7; font-weight: normal; }

      .pick-menu {
        position: absolute;
        top: calc(100% + 4px);
        left: 0;
        background: white;
        color: #111827;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        box-shadow: 0 8px 24px rgba(0,0,0,0.12);
        min-width: 220px;
        max-height: 280px;
        overflow-y: auto;
        z-index: 20;
        display: none;
        font-weight: normal;
      }
      .cmp-dropdown.open .pick-menu { display: block; }
      .pick-option {
        padding: 8px 12px;
        cursor: pointer;
        font-size: 12px;
        line-height: 1.4;
        border-bottom: 1px solid #f3f4f6;
      }
      .pick-option:last-child { border-bottom: none; }
      .pick-option:hover { background: #f9fafb; }
      .pick-date { color: #6b7280; font-weight: 500; margin-bottom: 1px; }
      .pick-option.disabled { opacity: 0.4; cursor: not-allowed; }
      .pick-option.disabled:hover { background: white; }

      .activity-section-divider {
        height: 1px;
        margin: 8px 12px;
        background: #e5e7eb;
      }

      .activity-item {
        padding: 10px 12px;
        font-size: 12px;
        cursor: pointer;
        border-radius: 6px;
        line-height: 1.4;
      }
      .activity-item:hover { background: #f9fafb; }
      .activity-time { color: #6b7280; font-weight: 500; margin-bottom: 2px; }
      .activity-users { color: #111827; font-size: 12px; }

      .activity-item.selected {
        background: #4f46e5;
        color: white;
      }
      .activity-item.selected:hover { background: #4338ca; }
      .activity-item.selected .activity-time,
      .activity-item.selected .activity-users { color: #e0e7ff; }

      .activity-prompt {
        font-size: 11px;
        color: #4f46e5;
        font-style: italic;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .activity-rollback {
        font-size: 11px;
        color: #dc2626;
        font-weight: 500;
        margin-top: 2px;
      }

      .activity-empty {
        padding: 24px 16px;
        text-align: center;
        color: #9ca3af;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h1>YHub - Tiptap Demo</h1>
      <div class="header-right">
        <div class="suggestion-controls">
          <label>Suggestions:</label>
          <select id="select-suggestion-mode">
            <option value="off">Off</option>
            <option value="view">View</option>
            <option value="edit">Edit</option>
          </select>
          <button id="btn-accept-changes" class="accept" style="display:none">Accept</button>
          <button id="btn-reject-changes" class="reject" style="display:none">Reject</button>
          <button id="btn-accept-all" class="accept" style="display:none">Accept All</button>
          <button id="btn-reject-all" class="reject" style="display:none">Reject All</button>
        </div>
        <span id="status" class="status">connecting</span>
      </div>
    </div>
    <div class="main-container">
      <div class="editor-container">
        <div id="toolbar"></div>
        <div id="editor"></div>
      </div>
      <div class="right-column">
        <div id="activity-panel">
          <div class="panel-header">
            <span class="panel-title">Activity</span>
          </div>
          <div id="activity-list">
            <div class="activity-empty">No activity yet</div>
          </div>
          <!-- The Rollback and Close buttons live inside the Comparing bar
               once it becomes active; they start detached and are re-parented
               by renderComparingBar. -->
          <button id="rollback-btn" title="Roll back selected range" style="display:none">↩️ Rollback</button>
          <button id="close-version-btn" title="Exit version view" style="display:none">✕</button>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
